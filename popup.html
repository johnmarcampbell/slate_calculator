<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typed Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="calculator-shell" aria-label="Typed calculator">
      <header class="topbar">
        <h1>Typed Calculator</h1>
        <div class="topbar-controls">
          <div class="mode-menu-wrap">
            <button id="modeMenuButton" type="button" class="ghost-button icon-button topbar-button" aria-label="Mode menu" aria-haspopup="menu" aria-expanded="false" aria-controls="modeMenu" title="Mode menu">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/>
              </svg>
            </button>
            <div id="modeMenu" class="mode-menu" role="menu" aria-label="Mode selection">
              <button id="calculatorModeButton" type="button" class="mode-menu-item active" role="menuitemradio" aria-checked="true">
                <span class="mode-check" aria-hidden="true">✓</span>
                <span>Calculator Mode</span>
              </button>
              <button id="graphModeButton" type="button" class="mode-menu-item" role="menuitemradio" aria-checked="false">
                <span class="mode-check" aria-hidden="true">✓</span>
                <span>Graphing Mode</span>
              </button>
            </div>
          </div>
          <div class="settings-menu-wrap">
            <button id="settingsMenuButton" type="button" class="ghost-button icon-button topbar-button" aria-label="Settings" aria-haspopup="menu" aria-expanded="false" aria-controls="settingsMenu" title="Settings">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
              </svg>
            </button>
            <div id="settingsMenu" class="settings-menu" role="menu" aria-label="Settings menu">
              <button id="radiansAngleButton" type="button" class="mode-menu-item active" role="menuitemradio" aria-checked="true">
                <span class="mode-check" aria-hidden="true">✓</span>
                <span>Radians</span>
              </button>
              <button id="degreesAngleButton" type="button" class="mode-menu-item" role="menuitemradio" aria-checked="false">
                <span class="mode-check" aria-hidden="true">✓</span>
                <span>Degrees</span>
              </button>
              <div class="mode-menu-divider" aria-hidden="true"></div>
              <button id="numberFormatButton" type="button" class="mode-menu-item" role="menuitem">
                <span>Number Format...</span>
              </button>
            </div>
          </div>
          <button id="popoutButton" type="button" class="ghost-button icon-button topbar-button" aria-label="Pop out" title="Pop out">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path d="M14 4h6v6h-2V7.41l-7.29 7.3-1.42-1.42 7.3-7.29H14V4zm4 14H6V6h6V4H6c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-6h-2v6z"/>
            </svg>
          </button>
        </div>
      </header>

      <section id="numberFormatPanel" class="settings-panel" aria-label="Number format settings" aria-hidden="true">
        <div class="settings-content">
          <div class="settings-header">
            <h2 class="settings-title">Number Format Settings</h2>
            <button id="numberFormatCloseButton" type="button" class="ghost-button icon-button settings-close-button" aria-label="Close settings" title="Close">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
              </svg>
            </button>
          </div>
          
          <div class="settings-group">
            <label for="sigDigitsSlider" class="settings-label">
              Significant Digits: <span id="sigDigitsValue" class="settings-value">12</span>
            </label>
            <input 
              id="sigDigitsSlider" 
              type="range" 
              min="3" 
              max="12" 
              value="12" 
              step="1"
              class="settings-slider"
              aria-valuemin="3"
              aria-valuemax="12"
              aria-valuenow="12"
            />
          </div>

          <div class="settings-group">
            <label for="magnitudeSlider" class="settings-label">
              Scientific Notation Magnitude: <span id="magnitudeValue" class="settings-value">6</span>
              <span class="settings-hint">(use sci notation for ≥10<sup>n</sup> or &lt;10<sup>-n</sup>)</span>
            </label>
            <input 
              id="magnitudeSlider" 
              type="range" 
              min="3" 
              max="20" 
              value="6" 
              step="1"
              class="settings-slider"
              aria-valuemin="3"
              aria-valuemax="20"
              aria-valuenow="6"
            />
          </div>

          <div class="settings-group">
            <fieldset class="settings-radio-group">
              <legend class="settings-label">Scientific Notation Style:</legend>
              <label class="radio-label">
                <input 
                  id="notationStyleE" 
                  type="radio" 
                  name="notationStyle" 
                  value="e" 
                  checked
                />
                <span>Exponential (e.g., 3.14e2)</span>
              </label>
              <label class="radio-label">
                <input 
                  id="notationStyleTimes10" 
                  type="radio" 
                  name="notationStyle" 
                  value="times10"
                />
                <span>Times 10 (e.g., 3.14×10<sup>2</sup>)</span>
              </label>
            </fieldset>
          </div>

          <div class="settings-group">
            <h3 class="settings-label">Preview:</h3>
            <div id="previewContainer" class="preview-container">
              <div class="preview-item">
                <span class="preview-label">Tiny:</span>
                <span id="previewTiny" class="preview-value">0.00000453245</span>
              </div>
              <div class="preview-item">
                <span class="preview-label">Small:</span>
                <span id="previewSmall" class="preview-value">0.123456789</span>
              </div>
              <div class="preview-item">
                <span class="preview-label">Integer:</span>
                <span id="previewInteger" class="preview-value">42</span>
              </div>
              <div class="preview-item">
                <span class="preview-label">Large:</span>
                <span id="previewLarge" class="preview-value">123456789012</span>
              </div>
              <div class="preview-item">
                <span class="preview-label">Huge:</span>
                <span id="previewHuge" class="preview-value">9.87654321e25</span>
              </div>
              <div class="preview-item">
                <span class="preview-label">Pi:</span>
                <span id="previewPi" class="preview-value">3.14159265359</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="calculatorView" class="view-panel" aria-label="Calculator view">

        <section class="calculation-panel">
          <label class="visually-hidden" for="expressionInput">Expression</label>
          <textarea
            id="expressionInput"
            rows="1"
            spellcheck="false"
            placeholder="1+2+3..."
          ></textarea>
          
          <div class="result-display" aria-live="polite">
            <p id="resultText" class="result-value">0.0</p>
          </div>
        </section>

        <section class="history-panel" aria-label="Calculation history">
          <div class="history-header">
            <h2>History</h2>
            <button id="clearHistoryButton" type="button" class="ghost-button icon-button" aria-label="Clear history" title="Clear history">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M9 3h6l1 2h5v2H3V5h5l1-2zm1 6h2v9h-2V9zm4 0h2v9h-2V9zM7 9h2v9H7V9z"/>
              </svg>
            </button>
          </div>
          <ul id="historyList" class="history-list"></ul>
        </section>
      </section>

      <section id="graphView" class="view-panel graph-panel hidden" aria-label="Graph view">
        <section class="input-panel">
          <label class="graph-label" for="graphExpressionInput">f(x)</label>
          <input id="graphExpressionInput" type="text" spellcheck="false" placeholder="Try sin(x), x^2, or 1/x" />
        </section>

        <section class="graph-controls-panel">
          <div class="range-grid">
            <label for="xMinInput">x min</label>
            <input id="xMinInput" type="number" step="any" />
            <label for="xMaxInput">x max</label>
            <input id="xMaxInput" type="number" step="any" />
            <label for="yMinInput">y min</label>
            <input id="yMinInput" type="number" step="any" />
            <label for="yMaxInput">y max</label>
            <input id="yMaxInput" type="number" step="any" />
          </div>

          <label class="checkbox-line" for="yAutoCheckbox">
            <input id="yAutoCheckbox" type="checkbox" checked />
            <span>Auto-scale y</span>
          </label>

          <div class="graph-actions">
            <button id="graphRedrawButton" type="button" class="ghost-button">Redraw</button>
            <button id="graphResetButton" type="button" class="ghost-button">Reset View</button>
          </div>
        </section>

        <section class="graph-canvas-panel">
          <canvas id="graphCanvas" width="340" height="220" aria-label="Function graph"></canvas>
          <p id="graphStatusText" class="hint">Enter f(x) and draw to begin.</p>
          <p id="graphCoordsText" class="graph-coords">x: -, y: -</p>
        </section>
      </section>
    </main>

    <script src="lib/jsep.iife.min.js"></script>
    <script src="evaluator.js"></script>
    <script src="history.js"></script>
    <script src="formatter.js"></script>
    <script src="grapher.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
