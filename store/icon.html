<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  #icon { display: block; }
</style>
</head>
<body>
<svg id="icon" width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34362e"/>
      <stop offset="1" stop-color="#1e1f1c"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="2" y="2" width="124" height="124" rx="26" fill="url(#bg)"/>
  <rect x="2" y="2" width="124" height="124" rx="26" fill="none" stroke="#75715e" stroke-opacity="0.55" stroke-width="3"/>
  <!-- Typed expression: pi glyph in Monokai cyan -->
  <text x="50" y="99" font-family="Menlo, Consolas, monospace" font-size="96" font-weight="700" fill="#66d9ef" text-anchor="middle">π</text>
  <!-- Text cursor block in Monokai green (typing motif) -->
  <rect x="88" y="26" width="18" height="76" rx="4" fill="#a6e22e"/>
</svg>
<script>
  const size = Number(new URLSearchParams(location.search).get('size')) || 128;
  const el = document.getElementById('icon');
  el.setAttribute('width', size);
  el.setAttribute('height', size);
</script>
</body>
</html>
