<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1400px; height: 560px; overflow: hidden; }
  body {
    display: flex;
    align-items: center;
    background:
      radial-gradient(1100px 700px at 88% 8%, rgba(102, 217, 239, 0.15), transparent 60%),
      radial-gradient(1000px 650px at 8% 100%, rgba(249, 38, 114, 0.12), transparent 60%),
      linear-gradient(135deg, #272822 0%, #1e1f1c 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .brand {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 26px;
    padding-left: 110px;
  }
  .brand img { width: 120px; height: 120px; }
  h1 {
    color: #f8f8f2;
    font-size: 64px;
    font-weight: 750;
    letter-spacing: -0.01em;
  }
  p.tag {
    color: #cfcfc2;
    font-size: 28px;
  }
  .history {
    width: 560px;
    margin-right: 110px;
    background: rgba(39, 40, 34, 0.95);
    border: 1px solid rgba(117, 113, 94, 0.45);
    border-radius: 16px;
    padding: 26px 30px;
    box-shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
    font-family: Menlo, Consolas, monospace;
  }
  .history .entry {
    padding: 14px 0;
    border-bottom: 1px solid rgba(117, 113, 94, 0.3);
  }
  .history .entry:last-child { border-bottom: 0; }
  .history .expr { color: #f8f8f2; font-size: 20px; }
  .history .res { color: #a6e22e; font-size: 20px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="brand">
    <img src="icon_badge.png" alt="">
    <h1>Slate Calculator</h1>
    <p class="tag">A calculator with history</p>
  </div>
  <div class="history">
    <div class="entry">
      <div class="expr">sin(pi/4)^2 + cos(pi/4)^2</div>
      <div class="res">= 1</div>
    </div>
    <div class="entry">
      <div class="expr">2*pi*6371</div>
      <div class="res">= 40030.1735920</div>
    </div>
    <div class="entry">
      <div class="expr">sqrt(2)/2</div>
      <div class="res">= 0.707106781187</div>
    </div>
  </div>
</body>
</html>
