<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 440px; height: 280px; overflow: hidden; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    background:
      radial-gradient(420px 300px at 85% 10%, rgba(102, 217, 239, 0.16), transparent 60%),
      radial-gradient(380px 280px at 10% 95%, rgba(249, 38, 114, 0.13), transparent 60%),
      linear-gradient(135deg, #272822 0%, #1e1f1c 100%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  img { width: 84px; height: 84px; }
  h1 {
    color: #f8f8f2;
    font-size: 34px;
    font-weight: 750;
    letter-spacing: -0.01em;
  }
  p {
    color: #cfcfc2;
    font-size: 17px;
  }
  p code {
    font-family: Menlo, Consolas, monospace;
    color: #a6e22e;
    font-size: 15px;
  }
</style>
</head>
<body>
  <img src="icon_badge.png" alt="">
  <h1>Slate Calculator</h1>
  <p>A calculator with history</p>
</body>
</html>
